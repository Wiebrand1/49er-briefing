<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>49er Dagelijkse Briefing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap');

  :root {
    --ocean: #0A1628;
    --deep: #0D1F3C;
    --hull: #122548;
    --wake: #1E3A5F;
    --horizon: #2C6FAD;
    --foam: #7BB8E8;
    --sail: #E8F4FD;
    --wind: #00D4FF;
    --warning: #FF6B35;
    --go: #00E5A0;
    --text: #E8F4FD;
    --muted: #7BB8E8;
    --card: rgba(18, 37, 72, 0.85);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--ocean);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated water background */
  .water-bg {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(0, 212, 255, 0.05) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(44, 111, 173, 0.1) 0%, transparent 50%),
      linear-gradient(180deg, #0A1628 0%, #0D1F3C 50%, #0A1628 100%);
    z-index: 0;
  }

  .wave {
    position: fixed;
    width: 200%;
    height: 200px;
    bottom: -50px;
    left: -50%;
    background: rgba(0, 212, 255, 0.03);
    border-radius: 40%;
    animation: wave 12s infinite linear;
    z-index: 0;
  }

  .wave:nth-child(2) {
    animation-delay: -4s;
    animation-duration: 18s;
    opacity: 0.5;
    bottom: -30px;
  }

  @keyframes wave {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px 40px;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--foam);
    opacity: 0.8;
  }

  .date-tag {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
  }

  /* Location selector */
  .location-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border: 1px solid rgba(123, 184, 232, 0.15);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 20px;
    backdrop-filter: blur(10px);
  }

  .location-icon {
    font-size: 18px;
    flex-shrink: 0;
  }

  .location-info {
    flex: 1;
  }

  .location-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 500;
  }

  .location-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--sail);
    margin-top: 2px;
  }

  .location-hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    opacity: 0.7;
  }

  /* Wind hero */
  .wind-hero {
    background: linear-gradient(135deg, var(--hull) 0%, var(--wake) 100%);
    border: 1px solid rgba(0, 212, 255, 0.2);
    border-radius: 20px;
    padding: 28px 24px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .wind-hero::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
    border-radius: 50%;
  }

  .wind-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--wind);
    font-weight: 600;
    margin-bottom: 12px;
  }

  .wind-main {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 6px;
  }

  .wind-speed {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 56px;
    font-weight: 700;
    color: var(--sail);
    line-height: 1;
  }

  .wind-unit {
    font-size: 18px;
    color: var(--foam);
    font-weight: 400;
  }

  .wind-sub {
    display: flex;
    gap: 20px;
    margin-top: 12px;
  }

  .wind-stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .wind-stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .wind-stat-value {
    font-size: 15px;
    font-weight: 600;
    color: var(--foam);
  }

  .effective-wind {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(0, 212, 255, 0.1);
    border: 1px solid rgba(0, 212, 255, 0.25);
    border-radius: 8px;
    padding: 6px 12px;
    margin-top: 14px;
    font-size: 12px;
    color: var(--wind);
    font-weight: 500;
  }

  /* Cards */
  .card {
    background: var(--card);
    border: 1px solid rgba(123, 184, 232, 0.12);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 14px;
    backdrop-filter: blur(10px);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .card-icon {
    font-size: 20px;
  }

  .card-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--foam);
  }

  /* Setup grid */
  .setup-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .setup-item {
    background: rgba(10, 22, 40, 0.6);
    border-radius: 12px;
    padding: 12px;
  }

  .setup-item.full-width {
    grid-column: 1 / -1;
  }

  .setup-item-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 5px;
    font-weight: 500;
  }

  .setup-item-value {
    font-size: 13px;
    color: var(--sail);
    font-weight: 500;
    line-height: 1.4;
  }

  /* Kleding */
  .kleding-block {
    background: rgba(10, 22, 40, 0.6);
    border-radius: 12px;
    padding: 14px;
  }

  .kleding-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(123, 184, 232, 0.08);
  }

  .kleding-row:last-child {
    border-bottom: none;
  }

  .kleding-row-label {
    font-size: 11px;
    color: var(--muted);
    width: 55px;
    flex-shrink: 0;
    font-weight: 500;
  }

  .kleding-row-value {
    font-size: 13px;
    color: var(--sail);
    font-weight: 500;
  }

  /* Temp badge */
  .temp-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(0, 229, 160, 0.1);
    border: 1px solid rgba(0, 229, 160, 0.2);
    color: var(--go);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 12px;
    font-weight: 600;
    float: right;
  }

  /* Loading */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 16px;
  }

  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(0, 212, 255, 0.2);
    border-top-color: var(--wind);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text {
    font-size: 14px;
    color: var(--muted);
  }

  /* Error */
  .error-card {
    background: rgba(255, 107, 53, 0.1);
    border: 1px solid rgba(255, 107, 53, 0.3);
    border-radius: 14px;
    padding: 20px;
    text-align: center;
  }

  .error-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--warning);
    margin-bottom: 8px;
  }

  .error-text {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* Config section */
  .config-section {
    background: rgba(44, 111, 173, 0.1);
    border: 1px solid rgba(44, 111, 173, 0.3);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .config-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--foam);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .config-input {
    width: 100%;
    background: rgba(10, 22, 40, 0.8);
    border: 1px solid rgba(123, 184, 232, 0.2);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--sail);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .config-input:focus {
    border-color: var(--wind);
  }

  .config-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--horizon), var(--wind));
    border: none;
    border-radius: 10px;
    padding: 13px;
    color: var(--ocean);
    font-size: 14px;
    font-weight: 700;
    font-family: 'Space Grotesk', sans-serif;
    cursor: pointer;
    margin-top: 10px;
    letter-spacing: 0.05em;
  }

  .footer {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    opacity: 0.5;
    margin-top: 24px;
  }
</style>
</head>
<body>
<div class="water-bg"></div>
<div class="wave"></div>
<div class="wave"></div>

<div class="container">
  <header>
    <div class="logo">49er Briefing</div>
    <div class="date-tag" id="dateTag">—</div>
  </header>

  <div id="configSection" class="config-section" style="display:none">
    <div class="config-title">⚙️ API Key instellen</div>
    <input type="password" class="config-input" id="apiKeyInput" placeholder="Plak hier je Google API key...">
    <button class="config-btn" onclick="saveApiKey()">Opslaan & laden</button>
  </div>

  <div id="mainContent">
    <div class="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">Briefing laden...</div>
    </div>
  </div>

  <div class="footer">Locatie wijzigen? Pas cel B1 aan in Google Sheets → Locatie tab</div>
</div>

<script>
const SHEET_ID = '113xyCg_lcFGx14x45NNImZbEt4PR1JisSNThejHOZSA';

function getApiKey() {
  return localStorage.getItem('49er_api_key') || '';
}

function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) return;
  localStorage.setItem('49er_api_key', key);
  document.getElementById('configSection').style.display = 'none';
  loadBriefing();
}

function setDate() {
  const now = new Date();
  const opts = { weekday: 'long', day: 'numeric', month: 'long' };
  document.getElementById('dateTag').textContent = now.toLocaleDateString('nl-NL', opts);
}

async function fetchSheet(range) {
  const key = getApiKey();
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?key=${key}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  return data.values;
}

function parseKleding(raw) {
  if (!raw || raw === 'Geen match') return { gear: '—', top: '—', bottom: '—' };
  const gear = raw.match(/Gear:\s*(\w+)/i)?.[1] || '—';
  const top = raw.match(/Top:\s*([^\n]+)/i)?.[1]?.trim() || '—';
  const bottom = raw.match(/Bottom:\s*([^\n]+)/i)?.[1]?.trim() || '—';
  return { gear, top, bottom };
}

async function loadBriefing() {
  const key = getApiKey();
  if (!key) {
    document.getElementById('configSection').style.display = 'block';
    document.getElementById('mainContent').innerHTML = '';
    return;
  }

  try {
    const [locData, briefingData] = await Promise.all([
      fetchSheet('Locatie!B1'),
      fetchSheet('Briefing!B1:B6')
    ]);

    const locatie = locData?.[0]?.[0] || 'Onbekend';
    const effectiefWind = parseFloat((briefingData?.[0]?.[0] || '0').replace(',', '.'));
    const gevoelsTemp = parseFloat((briefingData?.[1]?.[0] || '0').replace(',', '.'));
    const mastSetup = briefingData?.[2]?.[0] || 'Geen data';
    const lattenspanning = briefingData?.[3]?.[0] || 'Geen data';
    const jibHoogte = briefingData?.[4]?.[0] || 'Geen data';
    const kledingRaw = briefingData?.[5]?.[0] || 'Geen match';
    const kleding = parseKleding(kledingRaw);

    // Bereken wind range label
    const windRanges = [
      [0, 5, '0–5 kn'], [6, 8, '6–8 kn'], [9, 11, '9–11 kn'],
      [12, 15, '12–15 kn'], [16, 19, '16–19 kn'], [20, 24, '20–24 kn'], [25, 99, '25+ kn']
    ];
    const rangeLabel = windRanges.find(([min, max]) => effectiefWind >= min && effectiefWind <= max)?.[2] || '—';

    document.getElementById('mainContent').innerHTML = `
      <div class="location-bar">
        <div class="location-icon">📍</div>
        <div class="location-info">
          <div class="location-label">Huidige locatie</div>
          <div class="location-name">${locatie}</div>
          <div class="location-hint">Wijzig via Google Sheets → Locatie → B1</div>
        </div>
      </div>

      <div class="wind-hero">
        <div class="wind-label">💨 Wind nu</div>
        <div class="wind-main">
          <div class="wind-speed">${effectiefWind.toFixed(1)}</div>
          <div class="wind-unit">kn</div>
        </div>
        <div class="wind-sub">
          <div class="wind-stat">
            <div class="wind-stat-label">Windrange</div>
            <div class="wind-stat-value">${rangeLabel}</div>
          </div>
          <div class="wind-stat">
            <div class="wind-stat-label">Gevoelstemp</div>
            <div class="wind-stat-value">${gevoelsTemp.toFixed(1)}°C</div>
          </div>
        </div>
        <div class="effective-wind">⚡ Effectieve wind incl. +1,5 kn marge</div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-icon">⛵</div>
          <div class="card-title">Boot Setup</div>
        </div>
        <div class="setup-grid">
          <div class="setup-item full-width">
            <div class="setup-item-label">Mast Setup</div>
            <div class="setup-item-value">${mastSetup}</div>
          </div>
          <div class="setup-item">
            <div class="setup-item-label">Lattenspanning</div>
            <div class="setup-item-value">${lattenspanning}</div>
          </div>
          <div class="setup-item">
            <div class="setup-item-label">Jib Hoogte</div>
            <div class="setup-item-value">${jibHoogte}</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-icon">👕</div>
          <div class="card-title">Kleding</div>
          <span class="temp-badge">🌡 ${gevoelsTemp.toFixed(0)}°C</span>
        </div>
        <div class="kleding-block">
          <div class="kleding-row">
            <div class="kleding-row-label">Gear</div>
            <div class="kleding-row-value">${kleding.gear}</div>
          </div>
          <div class="kleding-row">
            <div class="kleding-row-label">Top</div>
            <div class="kleding-row-value">${kleding.top}</div>
          </div>
          <div class="kleding-row">
            <div class="kleding-row-label">Bottom</div>
            <div class="kleding-row-value">${kleding.bottom}</div>
          </div>
        </div>
      </div>
    `;
  } catch (err) {
    document.getElementById('mainContent').innerHTML = `
      <div class="error-card">
        <div class="error-title">Kan briefing niet laden</div>
        <div class="error-text">
          Controleer je API key en zorg dat de Google Sheet publiek leesbaar is.<br><br>
          <small style="opacity:0.7">${err.message}</small>
        </div>
      </div>
      <div class="config-section" style="margin-top:16px; background: rgba(44,111,173,0.1); border: 1px solid rgba(44,111,173,0.3); border-radius:14px; padding:20px;">
        <div class="config-title">⚙️ API Key opnieuw instellen</div>
        <input type="password" class="config-input" id="apiKeyInput" placeholder="Plak hier je Google API key...">
        <button class="config-btn" onclick="saveApiKey()">Opslaan & opnieuw laden</button>
      </div>
    `;
  }
}

// Google Sheet publiek maken check
async function init() {
  setDate();
  const key = getApiKey();
  if (!key) {
    document.getElementById('configSection').style.display = 'block';
    document.getElementById('mainContent').innerHTML = '';
  } else {
    loadBriefing();
  }
}

init();
</script>
</body>
</html>
